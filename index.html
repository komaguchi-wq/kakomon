<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>過去問</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <header id="app-header">
    <button id="back-btn" class="back-btn" hidden>‹ もどる</button>
    <h1 id="app-title">🏫 過去問</h1>
    <span class="portal-nav">
      <a class="portal-link" href="https://komaguchi-wq.github.io/study-portal/">🏠 学習ポータルTOPへ</a>
    </span>
  </header>

  <!-- 学校一覧 -->
  <main id="home" class="screen">
    <div id="school-list"><p class="loading">読み込み中…</p></div>
  </main>

  <!-- 学校トップ（年度・回一覧） -->
  <main id="school" class="screen" hidden>
    <h2 id="school-title" class="screen-title"></h2>
    <div id="exam-list"></div>
  </main>

  <!-- 学校情報・出題傾向 -->
  <main id="info" class="screen" hidden>
    <div class="detail-bar">
      <h2 id="info-title" class="screen-title"></h2>
      <div class="tabs">
        <button id="info-print-btn" class="print-btn">🖨 印刷（B4横 2面）</button>
      </div>
    </div>
    <div id="info-stack" class="page-stack"></div>
  </main>

  <!-- 試験詳細（教科×タブ） -->
  <main id="detail" class="screen" hidden>
    <h2 id="detail-title" class="screen-title"></h2>
    <div class="detail-bar">
      <div id="subject-tabs" class="subject-tabs"></div>
      <div class="tabs">
        <button class="tab active" data-view="question">問題＆解答用紙</button>
        <button class="tab" data-view="expl">解答解説</button>
        <span class="print-group" id="print-group"></span>
      </div>
    </div>
    <p id="view-note" class="view-note"></p>
    <div id="page-stack" class="page-stack"></div>
  </main>

  <!-- 拡大ライトボックス -->
  <div id="lightbox" class="lightbox" hidden>
    <button id="lightbox-close" class="lightbox-close">✕ とじる</button>
    <div class="lightbox-scroll"><img id="lightbox-img" alt="拡大"></div>
  </div>

  <!-- 印刷専用コンテナ -->
  <div id="print-container"></div>

  <script src="app.js?v=3"></script>
</body>
</html>
